# ================== Server & App Config ==================
server.port=8080
spring.application.name=IRIR

# ================== Database Config ==================
spring.datasource.url=${IRIR_DB_URL:jdbc:mysql://localhost:3306/irir_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Africa/Nairobi&allowPublicKeyRetrieval=true}
spring.datasource.username=${IRIR_DB_USERNAME:root}
spring.datasource.password=${IRIR_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.upload.dir=${IRIR_UPLOAD_DIR:uploads}

# ================== Email (SMTP) Config ==================
# Example using Gmail SMTP
spring.mail.host=${IRIR_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${IRIR_MAIL_PORT:587}
spring.mail.username=${IRIR_MAIL_USERNAME:}
spring.mail.password=${IRIR_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Optional: for testing, use a different SMTP server if not Gmail
# spring.mail.host=smtp.example.com
# spring.mail.port=587
# spring.mail.username=your-email@example.com
# spring.mail.password=your-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# ================== Scheduled Tasks ==================
# Enables @Scheduled methods, e.g., token cleanup
spring.task.scheduling.enabled=true
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}
app.notification.fail-on-error=${APP_NOTIFICATION_FAIL_ON_ERROR:false}
app.similarity.warning-threshold=${APP_SIMILARITY_WARNING_THRESHOLD:0.45}
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.first-name=${APP_BOOTSTRAP_ADMIN_FIRST_NAME:System}
app.bootstrap.admin.last-name=${APP_BOOTSTRAP_ADMIN_LAST_NAME:Administrator}
app.bootstrap.admin.department=${APP_BOOTSTRAP_ADMIN_DEPARTMENT:Computer Science}

# ================== Thymeleaf ==================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
