services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PGDATABASE:-unisubmit}
      POSTGRES_USER: ${PGUSER:-unisubmit}
      POSTGRES_PASSWORD: ${PGPASSWORD:-unisubmit}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-unisubmit} -d ${PGDATABASE:-unisubmit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-unisubmit}
      PGUSER: ${PGUSER:-unisubmit}
      PGPASSWORD: ${PGPASSWORD:-unisubmit}
      APP_UPLOAD_DIR: /app/uploads
      PORT: 8080
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - uploads:/app/uploads

  grobid:
    image: lfoppiano/grobid:0.8.0
    ports:
      - "8070:8070"
    environment:
      - JAVA_OPTS=-Xmx2g
    restart: unless-stopped

  specter:
    build: ./specter-service
    ports:
      - "5001:5001"
    restart: unless-stopped

volumes:
  postgres-data:
  uploads:
