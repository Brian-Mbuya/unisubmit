# ==============================================================================
# IRIR - H2 in-memory configuration (dev)
# ==============================================================================

# -------------------- H2 Database --------------------
spring.datasource.url=jdbc:h2:mem:irir_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# -------------------- JPA / Hibernate --------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
app.upload.dir=${IRIR_UPLOAD_DIR:uploads}
app.similarity.warning-threshold=${APP_SIMILARITY_WARNING_THRESHOLD:0.45}
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn

# -------------------- H2 Console --------------------
spring.h2.console.enabled=true

spring.h2.console.path=/h2-console

# -------------------- Local Dev Bootstrap --------------------
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@chuka.ac.ke}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:Admin@2024}
