services:
  - type: web
    name: unisubmit
    runtime: docker
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: APP_UPLOAD_DIR
        value: /tmp/uploads
      - key: DB_MAX_POOL_SIZE
        value: "5"
      - key: DB_MIN_IDLE
        value: "1"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "30000"
      - key: JDBC_DATABASE_URL
        sync: false
      - key: PGUSER
        sync: false
      - key: PGPASSWORD
        sync: false
