<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Dark charcoal background -->
  <rect width="48" height="48" rx="10" fill="#121417"/>

  <!-- Open book base — jade green -->
  <path d="M8 31 C8 31 14 27 24 29 C34 27 40 31 40 31 L40 17 C40 17 34 13 24 15 C14 13 8 17 8 17 Z"
        fill="#2e8f7f" opacity="0.15"/>

  <!-- Left page -->
  <path d="M8 31 L8 17 C8 17 14 13 24 15 L24 29 C14 27 8 31 8 31 Z"
        fill="none" stroke="#2e8f7f" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Right page -->
  <path d="M40 31 L40 17 C40 17 34 13 24 15 L24 29 C34 27 40 31 40 31 Z"
        fill="none" stroke="#2e8f7f" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Spine -->
  <line x1="24" y1="15" x2="24" y2="29" stroke="#5fbfab" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Network nodes — brass/gold accent -->
  <!-- Node: top-left -->
  <circle cx="12" cy="12" r="2.2" fill="#cda660"/>
  <!-- Node: top-right -->
  <circle cx="36" cy="12" r="2.2" fill="#cda660"/>
  <!-- Node: bottom-center -->
  <circle cx="24" cy="38" r="2.2" fill="#cda660"/>

  <!-- Connector lines between nodes and book -->
  <line x1="12" y1="14" x2="14" y2="18"  stroke="#cda660" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
  <line x1="36" y1="14" x2="34" y2="18"  stroke="#cda660" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
  <line x1="24" y1="36" x2="24" y2="31"  stroke="#cda660" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
  <!-- Cross-links between nodes -->
  <line x1="12" y1="12" x2="36" y2="12"  stroke="#cda660" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
  <line x1="12" y1="12" x2="24" y2="38"  stroke="#cda660" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
  <line x1="36" y1="12" x2="24" y2="38"  stroke="#cda660" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>
</svg>
