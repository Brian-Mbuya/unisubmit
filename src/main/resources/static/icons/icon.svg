<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark charcoal background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="#121417"/>

  <!-- Open book — left page -->
  <path d="M80 340 L80 186 C80 186 148 142 256 162 L256 316 C148 296 80 340 80 340 Z"
        fill="none" stroke="#2e8f7f" stroke-width="16" stroke-linejoin="round"/>

  <!-- Open book — right page -->
  <path d="M432 340 L432 186 C432 186 364 142 256 162 L256 316 C364 296 432 340 432 340 Z"
        fill="none" stroke="#2e8f7f" stroke-width="16" stroke-linejoin="round"/>

  <!-- Book fill — subtle jade tint -->
  <path d="M80 340 C80 340 148 296 256 316 C364 296 432 340 432 340 L432 186 C432 186 364 142 256 162 C148 142 80 186 80 186 Z"
        fill="#2e8f7f" opacity="0.08"/>

  <!-- Spine -->
  <line x1="256" y1="162" x2="256" y2="316" stroke="#5fbfab" stroke-width="14" stroke-linecap="round"/>

  <!-- Network nodes — brass/gold -->
  <circle cx="128" cy="110" r="28" fill="#cda660"/>
  <circle cx="384" cy="110" r="28" fill="#cda660"/>
  <circle cx="256" cy="420" r="28" fill="#cda660"/>

  <!-- Node connector lines -->
  <line x1="128" y1="138" x2="152" y2="178"  stroke="#cda660" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="384" y1="138" x2="360" y2="178"  stroke="#cda660" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="392" x2="256" y2="330"  stroke="#cda660" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- Cross-links between nodes -->
  <line x1="128" y1="110" x2="384" y2="110"  stroke="#cda660" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="128" y1="110" x2="256" y2="420"  stroke="#cda660" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="384" y1="110" x2="256" y2="420"  stroke="#cda660" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
</svg>
