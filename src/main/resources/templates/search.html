<!DOCTYPE html>
<html th:replace="~{layout :: html(content=~{::div})}">
<body>
    <div>
        <div class="page-head">
            <h1>Search</h1>
        </div>

        <form th:action="@{/search}" method="get" class="search-page-form" role="search">
            <input type="text" name="q" th:value="${query}" class="form-control search-page-input"
                   placeholder="e.g. traffic prediction, organizational communication, IoT sensors…"
                   autofocus autocomplete="off">
            <button type="submit" class="btn">Search</button>
        </form>

        <!-- No query yet -->
        <div th:if="${query.isEmpty()}" class="empty-state mt-6">
            <p>Search the archive.</p>
        </div>

        <!-- No hits -->
        <div th:if="${!query.isEmpty() and #lists.isEmpty(hits)}" class="empty-state mt-6">
            <p>No matches — try broader terms.</p>
        </div>

        <!-- Results -->
        <div th:if="${not #lists.isEmpty(hits)}" class="mt-6">
            <p class="text-sm text-muted mb-4"
               th:text="${#lists.size(hits)} + (${#lists.size(hits) == 1} ? ' result for “' : ' results for “') + ${query} + '”'">Results</p>
            <div class="row-list">
                <div th:each="hit : ${hits}" class="list-row">
                    <div class="list-row-main">
                        <a class="list-row-title" th:href="@{'/projects/' + ${hit.submission.id}}"
                           th:text="${hit.submission.title}">Title</a>
                        <div class="meta-line">
                            <span class="meta-item" th:if="${hit.submission.unit != null}"
                                  th:text="${hit.submission.unit.unitName}">Unit</span>
                            <span class="meta-item text-subtle"
                                  th:text="${hit.submission.student.name}">Student</span>
                            <span th:if="${hit.semanticMatch}" class="meta-item chip chip-gold">semantic</span>
                        </div>
                        <p class="text-sm text-muted mt-2 recommendation-summary" th:text="${hit.snippet}">Snippet</p>
                    </div>
                    <div class="list-row-side">
                        <div th:replace="~{fragments/components :: statusBadge(${hit.submission.status.name()})}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
