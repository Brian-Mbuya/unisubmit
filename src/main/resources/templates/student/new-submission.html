<!DOCTYPE html>
<html th:replace="~{layout :: html(content=~{::div})}">
<body>
    <div>
        <div class="page-head">
            <h1>New submission</h1>
            <a th:href="@{/student/dashboard}" class="btn btn-secondary">Cancel</a>
        </div>

        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <div class="card form-card">
            <form th:action="@{/student/submission}" method="post" enctype="multipart/form-data"
                  data-loading-submit="Uploading…">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label class="form-label" for="file">Document</label>
                    <input type="file" id="file" name="file" class="form-control" required accept=".pdf,.doc,.docx,.txt,.odt">
                    <div class="field-hint">PDF, DOC, DOCX, TXT or ODT · max 50 MB</div>

                    <!-- AI title suggestions — populated by app.js after the file is attached -->
                    <div id="new-title-suggestions-container" class="muted-panel accent-blue mt-4" style="display: none;">
                        <div class="flex items-center gap-2 mb-2">
                            <div class="ai-spinner" id="suggestions-spinner" style="display: none;"></div>
                            <span class="text-xs text-muted fw-600" id="suggestions-status-text">Suggested titles</span>
                        </div>
                        <div class="flex flex-col gap-2" id="new-title-suggestions-list">
                            <!-- suggestions populated here -->
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="title">Project title</label>
                    <input type="text" id="title" name="title" class="form-control" required
                           placeholder="e.g. Real-time flood prediction using LSTM networks">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="unitId">Unit</label>
                        <select id="unitId" name="unitId" class="form-control" required>
                            <option value="" disabled th:selected="${selectedUnitId == null}">— Select unit —</option>
                            <option th:each="unit : ${units}" th:value="${unit.id}"
                                    th:text="${unit.unitCode + ' - ' + unit.unitName}"
                                    th:selected="${selectedUnitId != null and unit.id == selectedUnitId}"></option>
                        </select>
                    </div>

                    <div class="form-group" th:if="${not #lists.isEmpty(groups)}">
                        <label class="form-label" for="groupId">Project group <span class="text-muted text-xs">(optional)</span></label>
                        <select id="groupId" name="groupId" class="form-control">
                            <option value="">— Individual submission —</option>
                            <option th:each="g : ${groups}" th:value="${g.id}" th:text="${g.name}"
                                    th:selected="${g.id == selectedGroupId}"></option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-block mt-2">Create submission</button>
            </form>
        </div>
    </div>
</body>
</html>
