<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: html(content=~{::div}, activeMenu='tags')}">
<body>
<div>
    <div class="page-head mb-6">
        <div>
            <div class="eyebrow">Admin console</div>
            <h1>Manage Knowledge Tags</h1>
            <p class="subtitle">Add, rename, merge, and clean up multidisciplinary classification terms.</p>
        </div>
    </div>

    <!-- 6 Column Grid for each lookup category -->
    <div class="tags-grid">
        
        <!-- Category Card Macro Fragment Generator -->
        <div th:each="cat : ${ { 
             ('Technologies'), 
             ('Research Areas'), 
             ('Frameworks'), 
             ('Databases'), 
             ('Programming Languages'), 
             ('Skills') } }" 
             class="card tag-category-card">
            
            <div class="tag-card-header">
                <h3 th:text="${cat}" class="text-accent no-margin">Category</h3>
                <span class="badge badge-submitted" 
                      th:with="listName=${#strings.toLowerCase(#strings.replace(cat, ' ', ''))}, 
                               listSize=${cat == 'Technologies' ? technologies.size() : 
                                         cat == 'Research Areas' ? researchAreas.size() : 
                                         cat == 'Frameworks' ? frameworks.size() : 
                                         cat == 'Databases' ? databases.size() : 
                                         cat == 'Programming Languages' ? programmingLanguages.size() : 
                                         skills.size()}" 
                      th:text="${listSize} + ' tags'">0 tags</span>
            </div>

            <!-- Create Tag Form -->
            <form th:action="@{/admin/tags/create}" method="post" class="tag-create-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="category" 
                       th:value="${cat == 'Technologies' ? 'TECHNOLOGY' : 
                                   cat == 'Research Areas' ? 'RESEARCH_AREA' : 
                                   cat == 'Frameworks' ? 'FRAMEWORK' : 
                                   cat == 'Databases' ? 'DATABASE' : 
                                   cat == 'Programming Languages' ? 'PROGRAMMING_LANGUAGE' : 
                                   'SKILL'}">
                <input type="text" name="name" required placeholder="New tag name..." 
                       class="form-control">
                <button type="submit" class="btn btn-sm">Add</button>
            </form>

            <!-- Scrollable list of existing tags -->
            <div class="tag-scroll-list">
                <!-- Target list selection -->
                <div th:each="tag : ${cat == 'Technologies' ? technologies : 
                                     cat == 'Research Areas' ? researchAreas : 
                                     cat == 'Frameworks' ? frameworks : 
                                     cat == 'Databases' ? databases : 
                                     cat == 'Programming Languages' ? programmingLanguages : 
                                     skills}" 
                     class="tag-item-row">
                    
                    <span th:text="${tag.name}" class="tag-item-name">Tag Name</span>
                    
                    <div class="tag-item-actions">
                        <!-- Inline Rename Action -->
                        <button class="btn btn-sm btn-secondary" 
                                th:onclick="renameTag([[${cat == 'Technologies' ? 'TECHNOLOGY' : 
                                                         cat == 'Research Areas' ? 'RESEARCH_AREA' : 
                                                         cat == 'Frameworks' ? 'FRAMEWORK' : 
                                                         cat == 'Databases' ? 'DATABASE' : 
                                                         cat == 'Programming Languages' ? 'PROGRAMMING_LANGUAGE' : 
                                                         'SKILL'}]], [[${tag.id}]], [[${tag.name}]])">
                            ✏️
                        </button>
                        
                        <!-- Inline Merge Action -->
                        <button class="btn btn-sm btn-secondary" 
                                th:onclick="mergeTags([[${cat == 'Technologies' ? 'TECHNOLOGY' : 
                                                        cat == 'Research Areas' ? 'RESEARCH_AREA' : 
                                                        cat == 'Frameworks' ? 'FRAMEWORK' : 
                                                        cat == 'Databases' ? 'DATABASE' : 
                                                        cat == 'Programming Languages' ? 'PROGRAMMING_LANGUAGE' : 
                                                        'SKILL'}]], [[${tag.id}]], [[${tag.name}]])">
                            🔗
                        </button>

                        <!-- Delete Form -->
                        <form th:action="@{/admin/tags/delete}" method="post" class="inline-form" 
                              onsubmit="return confirm('Delete this tag? Submissions referencing it will lose this tag link.');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="category" 
                                   th:value="${cat == 'Technologies' ? 'TECHNOLOGY' : 
                                              cat == 'Research Areas' ? 'RESEARCH_AREA' : 
                                              cat == 'Frameworks' ? 'FRAMEWORK' : 
                                              cat == 'Databases' ? 'DATABASE' : 
                                              cat == 'Programming Languages' ? 'PROGRAMMING_LANGUAGE' : 
                                              'SKILL'}">
                            <input type="hidden" name="id" th:value="${tag.id}">
                            <button type="submit" class="btn btn-sm btn-danger">🗑️</button>
                        </form>
                    </div>
                </div>

                <div th:if="${(cat == 'Technologies' and technologies.empty) or 
                              (cat == 'Research Areas' and researchAreas.empty) or 
                              (cat == 'Frameworks' and frameworks.empty) or 
                              (cat == 'Databases' and databases.empty) or 
                              (cat == 'Programming Languages' and programmingLanguages.empty) or 
                              (cat == 'Skills' and skills.empty)}" 
                     class="text-center text-muted py-4 text-sm italic">
                    No tags seeded yet.
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Action Forms for Javascript interaction -->
    <form id="jsRenameForm" th:action="@{/admin/tags/rename}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="category" id="renameCategory">
        <input type="hidden" name="id" id="renameId">
        <input type="hidden" name="newName" id="renameNewName">
    </form>

    <form id="jsMergeForm" th:action="@{/admin/tags/merge}" method="post" style="display:none;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="category" id="mergeCategory">
        <input type="hidden" name="sourceId" id="mergeSourceId">
        <input type="hidden" name="targetId" id="mergeTargetId">
    </form>

    <!-- Simple premium JS helpers for rename/merge inline prompts -->
    <script th:inline="javascript">
        /*[+
        const technologies = [[${technologies}]];
        const researchAreas = [[${researchAreas}]];
        const frameworks = [[${frameworks}]];
        const databases = [[${databases}]];
        const programmingLanguages = [[${programmingLanguages}]];
        const skills = [[${skills}]];
        +]*/

        function renameTag(category, id, currentName) {
            const newName = prompt("Rename tag '" + currentName + "' to:", currentName);
            if (newName && newName.trim() !== "" && newName.trim() !== currentName) {
                document.getElementById('renameCategory').value = category;
                document.getElementById('renameId').value = id;
                document.getElementById('renameNewName').value = newName.trim();
                document.getElementById('jsRenameForm').submit();
            }
        }

        function mergeTags(category, id, currentName) {
            let list = [];
            if (category === 'TECHNOLOGY') list = technologies;
            else if (category === 'RESEARCH_AREA') list = researchAreas;
            else if (category === 'FRAMEWORK') list = frameworks;
            else if (category === 'DATABASE') list = databases;
            else if (category === 'PROGRAMMING_LANGUAGE') list = programmingLanguages;
            else if (category === 'SKILL') list = skills;

            const otherTags = list.filter(t => t.id !== id);
            if (otherTags.length === 0) {
                alert("No other tags in this category to merge into.");
                return;
            }

            let promptMsg = "Merge tag '" + currentName + "' into which target tag?\nChoose one of the following target tag IDs:\n\n";
            otherTags.forEach(t => {
                promptMsg += "[" + t.id + "] " + t.name + "\n";
            });

            const targetId = prompt(promptMsg);
            if (targetId && targetId.trim() !== "") {
                const targetIdParsed = parseInt(targetId.trim());
                if (isNaN(targetIdParsed)) {
                    alert("Invalid target tag ID.");
                    return;
                }
                const targetTag = otherTags.find(t => t.id === targetIdParsed);
                if (!targetTag) {
                    alert("Could not find a tag with ID " + targetIdParsed + " in this category.");
                    return;
                }
                if (confirm("Are you sure you want to merge '" + currentName + "' into '" + targetTag.name + "'? This will update all student submissions referencing '" + currentName + "' and delete it.")) {
                    document.getElementById('mergeCategory').value = category;
                    document.getElementById('mergeSourceId').value = id;
                    document.getElementById('mergeTargetId').value = targetIdParsed;
                    document.getElementById('jsMergeForm').submit();
                }
            }
        }
    </script>
</div>
</body>
</html>
