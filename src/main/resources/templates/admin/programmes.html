<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: html(content=~{::div}, activeMenu='programmes')}">
<body>
<div>
    <div class="page-head">
        <div>
            <h1>Programmes</h1>
            <p class="subtitle">Manage degree programmes and courses of study.</p>
        </div>
        <button class="btn" onclick="openModal('createProgModal')">+ Create programme</button>
    </div>

    <div class="card card-pad-0">
        <div class="table-toolbar">
            <span class="text-sm text-muted" th:text="${#lists.size(courses)} + ' programmes'">0</span>
            <input type="search" class="form-control" placeholder="Filter programmes…"
                   data-table-search="#programmesTable" aria-label="Filter programmes">
        </div>
        <div class="table-wrap table-stack">
            <table id="programmesTable">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Faculty</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="course : ${courses}"
                        th:data-id="${course.id}"
                        th:data-code="${course.code}"
                        th:data-name="${course.name}"
                        th:data-dept="${course.department.id}">
                        <td><code th:text="${course.code}"></code></td>
                        <td class="fw-600" th:text="${course.name}"></td>
                        <td class="text-muted" th:text="${course.department.name}"></td>
                        <td class="text-muted" th:text="${course.department.faculty.name}"></td>
                        <td class="text-right">
                            <button class="btn btn-sm btn-secondary edit-prog-btn">Edit</button>
                            <form th:action="@{/admin/programmes/{id}/delete(id=${course.id})}" method="post"
                                  class="inline-form"
                                  onsubmit="return confirm('Delete this programme? All curricula mapping under this programme will also be removed.');">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${courses.empty}">
                        <td colspan="5">
                            <div class="empty-state">
                                <h3>No programmes yet</h3>
                                <p>Create a programme above to map curriculum details.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Create Programme Modal -->
    <div id="createProgModal" class="modal-overlay" style="display:none;" onclick="closeOnOverlay(event,'createProgModal')">
        <div class="modal-card">
            <div class="modal-header">
                <h2 class="m-0">Create programme</h2>
                <button class="btn btn-sm btn-secondary" onclick="closeModal('createProgModal')">✕</button>
            </div>
            <form th:action="@{/admin/programmes}" method="post" class="modal-body">
                <div class="form-group">
                    <label class="form-label">Department <span class="text-danger">*</span></label>
                    <select name="departmentId" class="form-control" required>
                        <option value="">— Select department —</option>
                        <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Programme code <span class="text-danger">*</span></label>
                    <input type="text" name="code" class="form-control" required placeholder="e.g. BSC-CS">
                </div>
                <div class="form-group">
                    <label class="form-label">Programme name <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" required placeholder="e.g. Bachelor of Science in Computer Science">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('createProgModal')">Cancel</button>
                    <button type="submit" class="btn">Create programme</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Programme Modal -->
    <div id="editProgModal" class="modal-overlay" style="display:none;" onclick="closeOnOverlay(event,'editProgModal')">
        <div class="modal-card">
            <div class="modal-header">
                <h2 class="m-0">Edit programme</h2>
                <button class="btn btn-sm btn-secondary" onclick="closeModal('editProgModal')">✕</button>
            </div>
            <form id="editProgForm" method="post" class="modal-body">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label class="form-label">Department <span class="text-danger">*</span></label>
                    <select id="editProgDept" name="departmentId" class="form-control" required>
                        <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Programme code <span class="text-danger">*</span></label>
                    <input id="editProgCode" type="text" name="code" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Programme name <span class="text-danger">*</span></label>
                    <input id="editProgName" type="text" name="name" class="form-control" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('editProgModal')">Cancel</button>
                    <button type="submit" class="btn">Save changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).style.display='flex'; document.body.style.overflow='hidden'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; document.body.style.overflow=''; }
        function closeOnOverlay(e,id) { if(e.target.id===id) closeModal(id); }
        document.querySelectorAll('.edit-prog-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const row = this.closest('tr');
                document.getElementById('editProgForm').action = '/admin/programmes/' + row.dataset.id + '/update';
                document.getElementById('editProgCode').value = row.dataset.code;
                document.getElementById('editProgName').value = row.dataset.name;
                const sel = document.getElementById('editProgDept');
                for (let o of sel.options) o.selected = (o.value === row.dataset.dept);
                openModal('editProgModal');
            });
        });
        document.addEventListener('keydown', function(e) { if(e.key==='Escape'){ closeModal('createProgModal'); closeModal('editProgModal'); } });
    </script>
</div>
</body>
</html>
