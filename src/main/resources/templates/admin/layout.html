<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="html(content, activeMenu)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration — UniSubmit</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <!-- Installable app (PWA): manifest + theme + iOS icon. SW registered in app.js. -->
    <link rel="manifest" th:href="@{/manifest.webmanifest}">
    <meta name="theme-color" content="#121417">
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}">
    <script th:src="@{/js/app.js}" defer></script>
    <!-- Prefetch-on-touch for safe GET routes (see main layout for the why) -->
    <script type="speculationrules">
        {"prefetch":[{"source":"document","where":{"href_matches":["/student/*","/lecturer/*","/explore*","/groups*","/discover*"]},"eagerness":"moderate"}]}
    </script>
    <!-- Chart.js powers the admin dashboard visualisations (self-hosted, pinned 4.4.3 —
         the app has zero external dependencies) -->
    <script th:src="@{/js/vendor/chart.umd.min.js}"></script>
</head>
<body>
    <a class="skip-link" href="#adminContent">Skip to content</a>

    <header th:replace="~{fragments/navbar :: navbar}"></header>

    <div class="admin-layout">
        <aside class="admin-sidebar" aria-label="Administration">
            <div class="sidebar-heading">Overview</div>
            <a th:href="@{/admin/dashboard}" th:classappend="${activeMenu == 'dashboard' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
                <span>Dashboard</span>
            </a>

            <div class="sidebar-heading">Academic structure</div>
            <a th:href="@{/admin/faculties}" th:classappend="${activeMenu == 'faculties' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/></svg>
                <span>Faculties</span>
            </a>
            <a th:href="@{/admin/departments}" th:classappend="${activeMenu == 'departments' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                <span>Departments</span>
            </a>
            <a th:href="@{/admin/programmes}" th:classappend="${activeMenu == 'programmes' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/></svg>
                <span>Programmes</span>
            </a>
            <a th:href="@{/admin/units}" th:classappend="${activeMenu == 'units' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                <span>Units</span>
            </a>
            <a th:href="@{/admin/curricula}" th:classappend="${activeMenu == 'curricula' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                <span>Curricula</span>
            </a>

            <div class="sidebar-heading">People</div>
            <a th:href="@{/admin/assignments}" th:classappend="${activeMenu == 'assignments' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Lecturer mappings</span>
            </a>
            <a th:href="@{/admin/accounts}" th:classappend="${activeMenu == 'accounts' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Accounts</span>
            </a>
            <a th:href="@{/admin/import}" th:classappend="${activeMenu == 'import' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                <span>Bulk import</span>
            </a>

            <div class="sidebar-heading">Intelligence</div>
            <a th:href="@{/admin/tags}" th:classappend="${activeMenu == 'tags' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                <span>Knowledge tags</span>
            </a>
            <a th:href="@{/admin/evaluation}" th:classappend="${activeMenu == 'evaluation' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><path d="M3 3v18h18M7 16l4-6 4 3 5-8"/></svg>
                <span>Evaluation</span>
            </a>
            <a th:href="@{/admin/landscape}" th:classappend="${activeMenu == 'landscape' ? 'active' : ''}">
                <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" width="15" height="15"><circle cx="6" cy="16" r="2"/><circle cx="12" cy="7" r="2"/><circle cx="18" cy="13" r="2"/><path d="M7.5 14.5 10.5 9M13.7 8.2l2.8 3.3"/></svg>
                <span>Landscape</span>
            </a>
        </aside>

        <main id="adminContent" class="admin-content">
            <div th:replace="~{fragments/alerts :: alerts}"></div>
            <div th:replace="${content}"></div>
        </main>
    </div>

    <footer class="app-footer">
        <span>UniSubmit administration console</span>
        <a th:href="@{/}">Back to app</a>
    </footer>

    <nav th:replace="~{fragments/navbar :: bottomNav}"></nav>
</body>
</html>
