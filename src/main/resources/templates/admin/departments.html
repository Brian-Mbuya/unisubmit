<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: html(content=~{::div}, activeMenu='departments')}">
<body>
<div>
    <div class="page-head">
        <div>
            <h1>Departments</h1>
            <p class="subtitle">Manage academic departments across all faculties.</p>
        </div>
        <button class="btn" onclick="openModal('createDeptModal')">+ Create department</button>
    </div>

    <div class="card card-pad-0">
        <div class="table-toolbar">
            <span class="text-sm text-muted" th:text="${#lists.size(departments)} + ' departments'">0</span>
            <input type="search" class="form-control" placeholder="Filter departments…"
                   data-table-search="#departmentsTable" aria-label="Filter departments">
        </div>
        <div class="table-wrap table-stack">
            <table id="departmentsTable">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Faculty</th>
                        <th>Programmes</th>
                        <th class="text-right">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="d : ${departments}"
                        th:data-id="${d.id}"
                        th:data-code="${d.code}"
                        th:data-name="${d.name}"
                        th:data-faculty="${d.faculty.id}">
                        <td><code th:text="${d.code}"></code></td>
                        <td class="fw-600" th:text="${d.name}"></td>
                        <td class="text-muted" th:text="${d.faculty.name}"></td>
                        <td th:text="${d.courses.size()}"></td>
                        <td class="text-right">
                            <button class="btn btn-sm btn-secondary edit-dept-btn">Edit</button>
                            <form th:action="@{/admin/departments/{id}/delete(id=${d.id})}" method="post"
                                  class="inline-form"
                                  onsubmit="return confirm('Delete this department? All courses and units inside will also be removed.');">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${departments.empty}">
                        <td colspan="5">
                            <div class="empty-state">
                                <h3>No departments yet</h3>
                                <p>Create a department above to structure courses and units.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Create Department Modal -->
    <div id="createDeptModal" class="modal-overlay" style="display:none;" onclick="closeOnOverlay(event,'createDeptModal')">
        <div class="modal-card">
            <div class="modal-header">
                <h2 class="m-0">Create department</h2>
                <button class="btn btn-sm btn-secondary" onclick="closeModal('createDeptModal')">✕</button>
            </div>
            <form th:action="@{/admin/departments}" method="post" class="modal-body">
                <div class="form-group">
                    <label class="form-label">Faculty <span class="text-danger">*</span></label>
                    <select name="facultyId" class="form-control" required>
                        <option value="">— Select faculty —</option>
                        <option th:each="f : ${faculties}" th:value="${f.id}" th:text="${f.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Department code <span class="text-danger">*</span></label>
                    <input type="text" name="code" class="form-control" required placeholder="e.g. CS" maxlength="10">
                </div>
                <div class="form-group">
                    <label class="form-label">Department name <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" required placeholder="e.g. Department of Computer Science">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('createDeptModal')">Cancel</button>
                    <button type="submit" class="btn">Create department</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Department Modal -->
    <div id="editDeptModal" class="modal-overlay" style="display:none;" onclick="closeOnOverlay(event,'editDeptModal')">
        <div class="modal-card">
            <div class="modal-header">
                <h2 class="m-0">Edit department</h2>
                <button class="btn btn-sm btn-secondary" onclick="closeModal('editDeptModal')">✕</button>
            </div>
            <form id="editDeptForm" method="post" class="modal-body">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label class="form-label">Faculty <span class="text-danger">*</span></label>
                    <select id="editDeptFaculty" name="facultyId" class="form-control" required>
                        <option th:each="f : ${faculties}" th:value="${f.id}" th:text="${f.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Department code <span class="text-danger">*</span></label>
                    <input id="editDeptCode" type="text" name="code" class="form-control" required maxlength="10">
                </div>
                <div class="form-group">
                    <label class="form-label">Department name <span class="text-danger">*</span></label>
                    <input id="editDeptName" type="text" name="name" class="form-control" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('editDeptModal')">Cancel</button>
                    <button type="submit" class="btn">Save changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).style.display='flex'; document.body.style.overflow='hidden'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; document.body.style.overflow=''; }
        function closeOnOverlay(e,id) { if(e.target.id===id) closeModal(id); }
        document.querySelectorAll('.edit-dept-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                const row = this.closest('tr');
                document.getElementById('editDeptForm').action = '/admin/departments/' + row.dataset.id + '/update';
                document.getElementById('editDeptCode').value = row.dataset.code;
                document.getElementById('editDeptName').value = row.dataset.name;
                const sel = document.getElementById('editDeptFaculty');
                for (let o of sel.options) o.selected = (o.value === row.dataset.faculty);
                openModal('editDeptModal');
            });
        });
        document.addEventListener('keydown', function(e) { if(e.key==='Escape'){ closeModal('createDeptModal'); closeModal('editDeptModal'); } });
    </script>
</div>
</body>
</html>
