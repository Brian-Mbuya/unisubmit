<!DOCTYPE html>
<html th:replace="~{layout :: html(content=~{::div})}">
<body>
    <div class="auth-wrap">
        <!-- ── Brand panel (desktop only) ──────────────────────────────── -->
        <div class="auth-side">
            <svg th:replace="~{fragments/components :: brandMark('auth-mark')}"></svg>
            <h1>Locked out?</h1>
            <p class="auth-pitch">
                There is no automated email reset — a real administrator handles every request.
                Send yours and they will reset the password and share the new one with you directly.
            </p>
        </div>

        <!-- ── Request card ────────────────────────────────────────────── -->
        <div class="auth-card card">
            <div class="auth-head">
                <h1>Reset your password</h1>
                <p class="text-muted text-sm">
                    An administrator will reset it and share the new password with you.
                </p>
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label class="form-label" for="identifier">Student ID, Staff ID, email or username</label>
                    <input type="text" name="identifier" id="identifier" class="form-control"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="note">Note to the administrator <span class="text-muted text-xs">(optional)</span></label>
                    <textarea name="note" id="note" class="form-control" rows="2"
                              placeholder="Anything that helps them verify it's you"></textarea>
                </div>
                <button type="submit" class="btn btn-block mt-2">Send reset request</button>
            </form>

            <p class="auth-foot text-sm text-muted">
                Remembered it? <a th:href="@{/login}">Back to sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
