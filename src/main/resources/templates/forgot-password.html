<!DOCTYPE html>
<html th:replace="~{layout :: html(content=~{::div})}">
<body>
    <div class="auth-wrap">
        <div class="auth-card card">
            <div class="auth-head">
                <svg class="auth-mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <rect width="24" height="24" rx="6" fill="var(--brand)"/>
                    <path d="M12 5.4 3.8 9.4l8.2 4 8.2-4-8.2-4z" fill="#fff"/>
                    <path d="M7.4 12.4v2.9c0 1.15 2.06 2.1 4.6 2.1s4.6-.95 4.6-2.1v-2.9L12 14.65l-4.6-2.25z" fill="#fff" opacity="0.82"/>
                </svg>
                <h1>Reset your password</h1>
                <p class="text-muted text-sm">
                    Enter your Student ID, Staff ID, email, or username. An administrator will
                    reset it and share the new password with you.
                </p>
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label class="form-label" for="identifier">Student ID · Staff ID · Email · Username</label>
                    <input type="text" name="identifier" id="identifier" class="form-control"
                           placeholder="e.g. S001, you@university.edu, or admin" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="note">Note to the administrator <span class="text-muted text-xs">(optional)</span></label>
                    <textarea name="note" id="note" class="form-control" rows="2"
                              placeholder="Anything that helps them verify it's you"></textarea>
                </div>
                <button type="submit" class="btn btn-block mt-2">Send reset request</button>
            </form>

            <p class="auth-foot text-sm text-muted">
                Remembered it? <a th:href="@{/login}">Back to sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
