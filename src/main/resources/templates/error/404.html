<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found — UniSubmit</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta name="theme-color" content="#121417">
    <style>
        /* Critical fallback — keeps the page calm and dark even if the stylesheet fails */
        body { background: #121417; color: #eae7e0; font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif; margin: 0; }
    </style>
</head>
<body>
    <!-- Deliberately self-contained: no navbar fragment, no model attributes.
         This page must never be able to error itself. -->
    <main class="error-page">
        <svg class="error-mark" viewBox="0 0 100 100" aria-hidden="true" width="52" height="52">
            <!-- The "completed U" mark — kept in sync with fragments/components.html :: brandMark -->
            <rect width="100" height="100" rx="22" fill="#2e8f7f"/>
            <path d="M34 30v26c0 12.5 32 12.5 32 0V45" fill="none" stroke="#f2efe6" stroke-width="12" stroke-linecap="round"/>
            <circle cx="66" cy="30" r="6" fill="#e0be7e"/>
        </svg>


        <p class="error-code">404 · Not found</p>
        <h1 class="error-title">This page wandered off.</h1>
        <p class="error-text">
            The link may be old, or the page may have moved.
            Nothing you did caused this — your work is safe.
        </p>

        <div class="error-actions">
            <a class="btn" th:href="@{/}">Take me home</a>
            <button type="button" class="btn btn-secondary" onclick="history.back()">Go back</button>
        </div>

        <p class="error-foot">UniSubmit — academic submission &amp; collaboration platform</p>
    </main>
</body>
</html>
