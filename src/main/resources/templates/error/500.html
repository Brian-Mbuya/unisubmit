<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something went wrong — UniSubmit</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta name="theme-color" content="#121417">
    <style>
        /* Critical fallback — keeps the page calm and dark even if the stylesheet fails */
        body { background: #121417; color: #eae7e0; font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif; margin: 0; }
    </style>
</head>
<body>
    <!-- Deliberately self-contained: no navbar fragment, no model attributes.
         This page must never be able to error itself. -->
    <main class="error-page">
        <svg class="error-mark" viewBox="0 0 100 100" fill="none" aria-hidden="true" width="52" height="52">
            <!-- Book Pages (Jade Green #2e8f7f) -->
            <path d="M 8,76 C 20,91 38,94 50,94 C 62,94 80,91 92,76 L 92,30 C 80,23 62,17 50,22 C 38,17 20,23 8,30 Z" fill="none" stroke="#2e8f7f" stroke-width="3.5" stroke-linejoin="round"/>
            <path d="M 14,71 C 24,83 40,86 50,86 C 60,86 76,83 86,71 L 86,25 C 76,19 60,13 50,18 C 40,13 24,19 14,25 Z" fill="none" stroke="#2e8f7f" stroke-width="3" stroke-linejoin="round" opacity="0.8"/>
            <path d="M 20,66 C 28,75 42,78 50,78 C 58,78 72,75 80,66 L 80,20 C 72,15 58,9 50,14 C 42,9 28,15 20,20 Z" fill="none" stroke="#2e8f7f" stroke-width="2.5" stroke-linejoin="round" opacity="0.6"/>

            <!-- U Monogram (Jade Green) -->
            <path d="M 30,24 L 30,58 C 30,68 43,68 43,58 L 43,28" fill="none" stroke="#2e8f7f" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- S Monogram / Node line (Gold/Brass #cda660) -->
            <!-- Thick S outline -->
            <path d="M 25,53 C 17,60 18,77 30,81 C 42,85 48,74 49,66 C 50,54 60,45 63,39 C 66,33 79,29 75,19 C 71,9 56,16 54,24" fill="none" stroke="#cda660" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            
            <!-- Overlaid diagonal node connector line -->
            <path d="M 25,53 L 49,66 L 60,44 L 71,32 L 80,24" fill="none" stroke="#cda660" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- Nodes (Gold) -->
            <circle cx="25" cy="53" r="3.5" fill="#cda660" stroke="#121417" stroke-width="1.2"/>
            <circle cx="49" cy="66" r="3.5" fill="#cda660" stroke="#121417" stroke-width="1.2"/>
            <circle cx="60" cy="44" r="3.5" fill="#cda660" stroke="#121417" stroke-width="1.2"/>
            <circle cx="71" cy="32" r="3.5" fill="#cda660" stroke="#121417" stroke-width="1.2"/>
            <circle cx="80" cy="24" r="3.5" fill="#cda660" stroke="#121417" stroke-width="1.2"/>
         </svg>

        <p class="error-code">500 · Server error</p>
        <h1 class="error-title">Something went wrong on our side.</h1>
        <p class="error-text">
            Not your fault — a hiccup on the server. Your submissions and feedback
            are safe. Give it a moment, then try again.
        </p>

        <div class="error-actions">
            <a class="btn" th:href="@{/}">Take me home</a>
            <button type="button" class="btn btn-secondary" onclick="location.reload()">Try again</button>
        </div>

        <p class="error-foot">Still stuck? Sign out and back in, or come back in a few minutes.</p>
    </main>
</body>
</html>
