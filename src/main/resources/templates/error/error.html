<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something went wrong — UniSubmit</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <meta name="theme-color" content="#121417">
    <style>
        /* Critical fallback — keeps the page calm and dark even if the stylesheet fails */
        body { background: #121417; color: #eae7e0; font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif; margin: 0; }
    </style>
</head>
<body>
    <!-- Fallback for every status without its own page. Deliberately
         self-contained: no navbar fragment, no required model attributes. -->
    <main class="error-page">
        <svg class="error-mark" viewBox="0 0 24 24" fill="none" aria-hidden="true" width="52" height="52">
            <rect width="24" height="24" rx="5" fill="#2e8f7f"/>
            <path d="M4 15.5 L4 9 C4 9 7 7 12 7.8 C17 7 20 9 20 9 L20 15.5" fill="none" stroke="#fff" stroke-width="1.1" stroke-linejoin="round" opacity="0.85"/>
            <line x1="12" y1="7.8" x2="12" y2="15" stroke="#fff" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
            <circle cx="6" cy="5.5" r="1.3" fill="#cda660"/>
            <circle cx="18" cy="5.5" r="1.3" fill="#cda660"/>
            <circle cx="12" cy="19.5" r="1.3" fill="#cda660"/>
            <line x1="6" y1="5.5" x2="18" y2="5.5" stroke="#cda660" stroke-width="0.6" opacity="0.4"/>
            <line x1="6" y1="6.6" x2="7.5" y2="8.5" stroke="#cda660" stroke-width="0.6" opacity="0.5"/>
            <line x1="18" y1="6.6" x2="16.5" y2="8.5" stroke="#cda660" stroke-width="0.6" opacity="0.5"/>
            <line x1="12" y1="18.2" x2="12" y2="15.8" stroke="#cda660" stroke-width="0.6" opacity="0.5"/>
         </svg>

        <p class="error-code" th:text="${status != null} ? ${status} + ' · Unexpected detour' : 'Unexpected detour'">Unexpected detour</p>
        <h1 class="error-title">Well, that didn't go to plan.</h1>
        <p class="error-text">
            Something unexpected happened, but nothing was lost.
            Head back to safety and carry on from there.
        </p>

        <div class="error-actions">
            <a class="btn" th:href="@{/}">Take me home</a>
            <button type="button" class="btn btn-secondary" onclick="history.back()">Go back</button>
        </div>

        <p class="error-foot">UniSubmit — academic submission &amp; collaboration platform</p>
    </main>
</body>
</html>
