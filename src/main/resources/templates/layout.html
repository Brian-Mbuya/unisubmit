<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="html(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniSubmit</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>
    <a class="skip-link" href="#mainContent">Skip to content</a>

    <header th:replace="~{fragments/navbar :: navbar}"></header>

    <main id="mainContent" class="container" th:insert="${content}">
        <!-- Page content injected here -->
    </main>

    <footer class="app-footer">
        <span>UniSubmit — academic submission &amp; collaboration platform</span>
        <span class="flex items-center gap-4">
            <a sec:authorize="isAuthenticated()" th:href="@{/explore}">Explore the archive</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/notifications}">Notifications</a>
        </span>
    </footer>
</body>
</html>
