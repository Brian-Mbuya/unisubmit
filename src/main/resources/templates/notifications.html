<!DOCTYPE html>
<html th:replace="~{layout :: html(content=~{::div})}">
<body>
    <div>
        <div class="page-head">
            <h1>Notifications</h1>
            <form th:action="@{/notifications/mark-read}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-secondary">Mark all read</button>
            </form>
        </div>

        <div th:replace="~{fragments/alerts :: alerts}"></div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(notifications)}" class="empty-state">
            <p>No notifications yet.</p>
        </div>

        <!-- Feed -->
        <div th:if="${not #lists.isEmpty(notifications)}" class="card">
                    <div class="row-list">
                        <div th:each="n : ${notifications}"
                             th:class="'notification-item' + (${n.read} ? '' : ' unread')">
                            <div th:classappend="${n.type.name() == 'STATUS_CHANGE' ? 'status-change' : (n.type.name() == 'DEADLINE' ? 'deadline' : '')}"
                                 class="notification-icon" aria-hidden="true">
                                <svg th:if="${n.type.name() == 'NEW_FEEDBACK'}" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M14 1a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H4.414A2 2 0 0 0 3 11.586l-2 2V2a1 1 0 0 1 1-1h12zM2 0a2 2 0 0 0-2 2v12.793a.5.5 0 0 0 .854.353l2.853-2.853A1 1 0 0 1 4.414 12H14a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2z"/></svg>
                                <svg th:if="${n.type.name() == 'STATUS_CHANGE'}" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/><path d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3zM3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9H3.1z"/></svg>
                                <svg th:if="${n.type.name() != 'NEW_FEEDBACK' and n.type.name() != 'STATUS_CHANGE'}" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/></svg>
                            </div>
                            <div class="notification-body">
                                <div class="notification-message" th:text="${n.message}">Notification text</div>
                                <div class="notification-time"
                                     th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy, HH:mm')}">Date</div>
                            </div>
                            <a th:if="${n.relatedSubmissionId != null}"
                               th:href="@{'/projects/' + ${n.relatedSubmissionId}}"
                               class="btn btn-secondary btn-sm">View</a>
                        </div>
                    </div>
                </div>
    </div>
</body>
</html>
