<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!--
  ============================================================================
  IRIR — Base Layout Fragment
  Contains the common HTML structure, navigation bar, and footer
  used by all pages via Thymeleaf fragment inclusion.
  ============================================================================
-->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IRIR - Intelligent Research &amp; Innovation Repository for Chuka University">
    <title th:text="${title} + ' | IRIR'">IRIR</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

<!-- ==================== Navigation Bar ==================== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <!-- Brand -->
        <a class="navbar-brand d-flex align-items-center" th:href="@{/dashboard}">
            <i class="bi bi-journal-richtext me-2 fs-4"></i>
            <span class="fw-bold">IRIR</span>
            <span class="badge bg-accent ms-2 d-none d-md-inline">Chuka University</span>
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Nav Links -->
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto align-items-center">

                <!-- Authenticated Links -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i> Dashboard
                    </a>
                </li>

                <!-- Student Links -->
                <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                    <a class="nav-link" th:href="@{/student/projects}">
                        <i class="bi bi-folder2-open me-1"></i> My Projects
                    </a>
                </li>

                <!-- Supervisor Links -->
                <li class="nav-item" sec:authorize="hasRole('SUPERVISOR')">
                    <a class="nav-link" th:href="@{/supervisor/dashboard}">
                        <i class="bi bi-clipboard-check me-1"></i> Reviews
                    </a>
                </li>

                <!-- Directorate Links -->
                <li class="nav-item" sec:authorize="hasRole('DIRECTORATE')">
                    <a class="nav-link" th:href="@{/dashboard}">
                        <i class="bi bi-graph-up me-1"></i> Analytics
                    </a>
                </li>

                <!-- Admin Links -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">
                        <i class="bi bi-people me-1"></i> Users
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/workflows}">
                        <i class="bi bi-diagram-3 me-1"></i> Assignments
                    </a>
                </li>

                <!-- User Dropdown -->
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                        <li><a class="dropdown-item" th:href="@{/dashboard}"><i class="bi bi-person me-2"></i>Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>

                <!-- Login Link (not authenticated) -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Login
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ==================== Footer ==================== -->
<footer th:fragment="footer" class="footer mt-auto py-4">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6 text-center text-md-start">
                <p class="mb-0 text-muted">
                    <i class="bi bi-journal-richtext me-1"></i>
                    &copy; 2024 IRIR — Chuka University, Department of Computer Science
                </p>
            </div>
            <div class="col-md-6 text-center text-md-end">
                <p class="mb-0 text-muted small">
                    Intelligent Research &amp; Innovation Repository v1.0
                </p>
            </div>
        </div>
    </div>
</footer>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        th:fragment="scripts"></script>

</body>
</html>
