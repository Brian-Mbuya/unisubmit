<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot Password')}"></head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-bg-shape shape-1"></div>
        <div class="auth-bg-shape shape-2"></div>
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="bi bi-key"></i>
                </div>
                <h1 class="auth-title">Reset Password</h1>
                <p class="auth-subtitle">Enter your account email to receive a reset link.</p>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">Success</div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">Error</div>

            <form th:action="@{/forgot-password}" method="post" class="auth-form">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input id="email" name="email" type="email" class="form-control form-control-lg"
                           placeholder="your.email@chuka.ac.ke" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 auth-btn">
                    Send Reset Link
                </button>
            </form>

            <div class="auth-footer">
                <a th:href="@{/login}" class="auth-link">Back to login</a>
            </div>
        </div>
    </div>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
