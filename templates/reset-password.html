<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Set New Password')}"></head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-bg-shape shape-1"></div>
        <div class="auth-bg-shape shape-2"></div>
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h1 class="auth-title">Choose a New Password</h1>
                <p class="auth-subtitle">Set a strong password for your IRIR account.</p>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">Error</div>

            <form th:action="@{/reset-password}" method="post" class="auth-form">
                <input type="hidden" name="token" th:value="${token}">

                <div class="mb-3">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input id="newPassword" name="newPassword" type="password" class="form-control form-control-lg" required>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" class="form-control form-control-lg" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 auth-btn">
                    Update Password
                </button>
            </form>
        </div>
    </div>
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
